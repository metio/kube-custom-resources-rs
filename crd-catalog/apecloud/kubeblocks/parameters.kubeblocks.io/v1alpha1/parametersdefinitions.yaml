apiVersion: "apiextensions.k8s.io/v1"
kind: "CustomResourceDefinition"
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: "v0.18.0"
  labels:
    app.kubernetes.io/name: "kubeblocks"
  name: "parametersdefinitions.parameters.kubeblocks.io"
spec:
  group: "parameters.kubeblocks.io"
  names:
    categories:
      - "kubeblocks"
    kind: "ParametersDefinition"
    listKind: "ParametersDefinitionList"
    plural: "parametersdefinitions"
    shortNames:
      - "pd"
    singular: "parametersdefinition"
  scope: "Cluster"
  versions:
    - additionalPrinterColumns:
        - description: "config file name"
          jsonPath: ".spec.fileName"
          name: "FILE"
          type: "string"
        - description: "status phase"
          jsonPath: ".status.phase"
          name: "PHASE"
          type: "string"
        - jsonPath: ".metadata.creationTimestamp"
          name: "AGE"
          type: "date"
      name: "v1alpha1"
      schema:
        openAPIV3Schema:
          description: "ParametersDefinition is the Schema for the parametersdefinitions API"
          properties:
            apiVersion:
              description: "APIVersion defines the versioned schema of this representation of an object.\nServers should convert recognized schemas to the latest internal value, and\nmay reject unrecognized values.\nMore info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources"
              type: "string"
            kind:
              description: "Kind is a string value representing the REST resource this object represents.\nServers may infer this from the endpoint the client submits requests to.\nCannot be updated.\nIn CamelCase.\nMore info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds"
              type: "string"
            metadata:
              type: "object"
            spec:
              description: "ParametersDefinitionSpec defines the desired state of ParametersDefinition"
              properties:
                componentDef:
                  description: "Specifies the ComponentDefinition custom resource (CR) that defines the Component's characteristics and behavior.\nThe value can represent an exact name, a name prefix, or a regular expression pattern."
                  type: "string"
                deletedPolicy:
                  description: "Specifies the policy when parameter be removed."
                  properties:
                    defaultValue:
                      description: "Specifies the value to use if DeletedMethod is RestoreToDefault.\nExample: pg\nSET configuration_parameter TO DEFAULT;"
                      type: "string"
                    deletedMethod:
                      description: "Specifies the method to handle the deletion of a parameter.\nIf set to \"RestoreToDefault\", the parameter will be restored to its default value,\nwhich requires engine support, such as pg.\nIf set to \"Reset\", the parameter will be re-rendered through the configuration template."
                      enum:
                        - "RestoreToDefault"
                        - "Reset"
                      type: "string"
                  required:
                    - "deletedMethod"
                  type: "object"
                dynamicParameters:
                  description: "List dynamic parameters.\nModifications to these parameters trigger a configuration reload without requiring a process restart."
                  items:
                    type: "string"
                  type: "array"
                  x-kubernetes-list-type: "set"
                fileFormatConfig:
                  description: "Specifies the format of the configuration file and any associated parameters that are specific to the chosen format.\nSupported formats include `ini`, `xml`, `yaml`, `json`, `hcl`, `dotenv`, `properties`, and `toml`."
                  properties:
                    format:
                      description: "The config file format. Valid values are `ini`, `xml`, `yaml`, `json`,\n`hcl`, `dotenv`, `properties` and `toml`. Each format has its own characteristics and use cases.\n\n- ini: is a text-based content with a structure and syntax comprising key–value pairs for properties, reference wiki: https://en.wikipedia.org/wiki/INI_file\n- xml: refers to wiki: https://en.wikipedia.org/wiki/XML\n- yaml: supports for complex data types and structures.\n- json: refers to wiki: https://en.wikipedia.org/wiki/JSON\n- hcl: The HashiCorp Configuration Language (HCL) is a configuration language authored by HashiCorp, reference url: https://www.linode.com/docs/guides/introduction-to-hcl/\n- dotenv: is a plain text file with simple key–value pairs, reference wiki: https://en.wikipedia.org/wiki/Configuration_file#MS-DOS\n- properties: a file extension mainly used in Java, reference wiki: https://en.wikipedia.org/wiki/.properties\n- toml: refers to wiki: https://en.wikipedia.org/wiki/TOML\n- props-plus: a file extension mainly used in Java, supports CamelCase(e.g: brokerMaxConnectionsPerIp)"
                      enum:
                        - "xml"
                        - "ini"
                        - "yaml"
                        - "json"
                        - "hcl"
                        - "dotenv"
                        - "toml"
                        - "properties"
                        - "redis"
                        - "props-plus"
                        - "props-ultra"
                      type: "string"
                    iniConfig:
                      description: "Holds options specific to the 'ini' file format."
                      properties:
                        sectionName:
                          description: "A string that describes the name of the ini section."
                          type: "string"
                      type: "object"
                  required:
                    - "format"
                  type: "object"
                fileName:
                  description: "Specifies the config file name in the config template."
                  type: "string"
                immutableParameters:
                  description: "Lists the parameters that cannot be modified once set.\nAttempting to change any of these parameters will be ignored."
                  items:
                    type: "string"
                  type: "array"
                  x-kubernetes-list-type: "set"
                mergeReloadAndRestart:
                  description: "Indicates whether to consolidate dynamic reload and restart actions into a single restart.\n\n- If true, updates requiring both actions will result in only a restart, merging the actions.\n- If false, updates will trigger both actions executed sequentially: first dynamic reload, then restart.\n\nThis flag allows for more efficient handling of configuration changes by potentially eliminating\nan unnecessary reload step."
                  type: "boolean"
                parametersSchema:
                  description: "Defines a list of parameters including their names, default values, descriptions,\ntypes, and constraints (permissible values or the range of valid values)."
                  properties:
                    cue:
                      description: "Hold a string that contains a script written in CUE language that defines a list of configuration items.\nEach item is detailed with its name, default value, description, type (e.g. string, integer, float),\nand constraints (permissible values or the valid range of values).\n\nCUE (Configure, Unify, Execute) is a declarative language designed for defining and validating\ncomplex data configurations.\nIt is particularly useful in environments like K8s where complex configurations and validation rules are common.\n\nThis script functions as a validator for user-provided configurations, ensuring compliance with\nthe established specifications and constraints."
                      type: "string"
                    schemaInJSON:
                      description: "Generated from the 'cue' field and transformed into a JSON format."
                      x-kubernetes-preserve-unknown-fields: true
                    topLevelKey:
                      description: "Specifies the top-level key in the 'configSchema.cue' that organizes the validation rules for parameters.\nThis key must exist within the CUE script defined in 'configSchema.cue'."
                      type: "string"
                  type: "object"
                reloadAction:
                  description: "Specifies the dynamic reload (dynamic reconfiguration) actions supported by the engine.\nWhen set, the controller executes the scripts defined in these actions to handle dynamic parameter updates.\n\nDynamic reloading is triggered only if both of the following conditions are met:\n\n1. The modified parameters are listed in the `dynamicParameters` field.\n   If `dynamicParameterSelectedPolicy` is set to \"all\", modifications to `staticParameters`\n   can also trigger a reload.\n2. `reloadAction` is set.\n\nIf `reloadAction` is not set or the modified parameters are not listed in `dynamicParameters`,\ndynamic reloading will not be triggered."
                  properties:
                    autoTrigger:
                      description: "Automatically perform the reload when specified conditions are met."
                      properties:
                        processName:
                          description: "The name of the process."
                          type: "string"
                      type: "object"
                    shellTrigger:
                      description: "Allows to execute a custom shell script to reload the process."
                      properties:
                        command:
                          description: "Specifies the command to execute in order to reload the process. It should be a valid shell command."
                          items:
                            type: "string"
                          type: "array"
                        scriptConfig:
                          description: "ScriptConfig object specifies a ConfigMap that contains script files that should be mounted inside the pod.\nThe scripts are mounted as volumes and can be referenced and executed by the dynamic reload."
                          properties:
                            namespace:
                              default: "default"
                              description: "Specifies the namespace for the ConfigMap.\nIf not specified, it defaults to the \"default\" namespace."
                              maxLength: 63
                              pattern: "^[a-z0-9]([a-z0-9\\-]*[a-z0-9])?$"
                              type: "string"
                            scriptConfigMapRef:
                              description: "Specifies the reference to the ConfigMap containing the scripts."
                              type: "string"
                          required:
                            - "scriptConfigMapRef"
                          type: "object"
                        sync:
                          description: "Determines the synchronization mode of parameter updates with \"config-manager\".\n\n- 'True': Executes reload actions synchronously, pausing until completion.\n- 'False': Executes reload actions asynchronously, without waiting for completion."
                          type: "boolean"
                        toolsSetup:
                          description: "Specifies the tools container image used by ShellTrigger for dynamic reload.\nIf the dynamic reload action is triggered by a ShellTrigger, this field is required.\nThis image must contain all necessary tools for executing the ShellTrigger scripts.\n\nUsually the specified image is referenced by the init container,\nwhich is then responsible for copy the tools from the image to a bin volume.\nThis ensures that the tools are available to the 'config-manager' sidecar."
                          properties:
                            mountPoint:
                              description: "Specifies the directory path in the container where the tools-related files are to be copied.\nThis field is typically used with an emptyDir volume to ensure a temporary, empty directory is provided at pod creation."
                              maxLength: 128
                              type: "string"
                            toolConfigs:
                              description: "Specifies a list of settings of init containers that prepare tools for dynamic reload."
                              items:
                                description: "ToolConfig specifies the settings of an init container that prepare tools for dynamic reload."
                                properties:
                                  asContainerImage:
                                    description: "Indicates whether the tool image should be used as the container image for a sidecar.\nThis is useful for large tool images, such as those for C++ tools, which may depend on\nnumerous libraries (e.g., *.so files).\n\nIf enabled, the tool image is deployed as a sidecar container image.\n\nExamples:\n```yaml\n toolsSetup::\n   mountPoint: /kb_tools\n   toolConfigs:\n     - name: kb-tools\n       asContainerImage: true\n       image:  apecloud/oceanbase:4.2.0.0-100010032023083021\n```\n\ngenerated containers:\n```yaml\ninitContainers:\n - name: install-config-manager-tool\n   image: apecloud/kubeblocks-tools:${version}\n   command:\n   - cp\n   - /bin/config_render\n   - /opt/tools\n   volumemounts:\n   - name: kb-tools\n     mountpath: /opt/tools\n\ncontainers:\n - name: config-manager\n   image: apecloud/oceanbase:4.2.0.0-100010032023083021\n   imagePullPolicy: IfNotPresent\n\t  command:\n   - /opt/tools/reloader\n   - --log-level\n   - info\n   - --operator-update-enable\n   - --tcp\n   - \"9901\"\n   - --config\n   - /opt/config-manager/config-manager.yaml\n   volumemounts:\n   - name: kb-tools\n     mountpath: /opt/tools\n```"
                                    type: "boolean"
                                  command:
                                    description: "Specifies the command to be executed by the init container."
                                    items:
                                      type: "string"
                                    type: "array"
                                  image:
                                    description: "Specifies the tool container image."
                                    type: "string"
                                  imageMappings:
                                    description: "Defines image mapping for different service versions."
                                    items:
                                      properties:
                                        image:
                                          description: "Image is the container image addresses to use for the matched service versions."
                                          type: "string"
                                        serviceVersions:
                                          description: "ServiceVersions is a list of service versions that this mapping applies to."
                                          items:
                                            type: "string"
                                          type: "array"
                                      required:
                                        - "image"
                                        - "serviceVersions"
                                      type: "object"
                                    type: "array"
                                  name:
                                    description: "Specifies the name of the init container."
                                    maxLength: 63
                                    pattern: "^[a-z]([a-z0-9\\-]*[a-z0-9])?$"
                                    type: "string"
                                required:
                                  - "name"
                                type: "object"
                              type: "array"
                          required:
                            - "mountPoint"
                          type: "object"
                      required:
                        - "command"
                      type: "object"
                    targetPodSelector:
                      description: "Used to match labels on the pod to determine whether a dynamic reload should be performed.\n\nIn some scenarios, only specific pods (e.g., primary replicas) need to undergo a dynamic reload.\nThe `reloadedPodSelector` allows you to specify label selectors to target the desired pods for the reload process.\n\nIf the `reloadedPodSelector` is not specified or is nil, all pods managed by the workload will be considered for the dynamic\nreload."
                      properties:
                        matchExpressions:
                          description: "matchExpressions is a list of label selector requirements. The requirements are ANDed."
                          items:
                            description: "A label selector requirement is a selector that contains values, a key, and an operator that\nrelates the key and values."
                            properties:
                              key:
                                description: "key is the label key that the selector applies to."
                                type: "string"
                              operator:
                                description: "operator represents a key's relationship to a set of values.\nValid operators are In, NotIn, Exists and DoesNotExist."
                                type: "string"
                              values:
                                description: "values is an array of string values. If the operator is In or NotIn,\nthe values array must be non-empty. If the operator is Exists or DoesNotExist,\nthe values array must be empty. This array is replaced during a strategic\nmerge patch."
                                items:
                                  type: "string"
                                type: "array"
                            required:
                              - "key"
                              - "operator"
                            type: "object"
                          type: "array"
                        matchLabels:
                          additionalProperties:
                            type: "string"
                          description: "matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels\nmap is equivalent to an element of matchExpressions, whose key field is \"key\", the\noperator is \"In\", and the values array contains only \"value\". The requirements are ANDed."
                          type: "object"
                      type: "object"
                      x-kubernetes-map-type: "atomic"
                  type: "object"
                reloadStaticParamsBeforeRestart:
                  description: "Configures whether the dynamic reload specified in `reloadAction` applies only to dynamic parameters or\nto all parameters (including static parameters).\n\n- false (default): Only modifications to the dynamic parameters listed in `dynamicParameters`\n  will trigger a dynamic reload.\n- true: Modifications to both dynamic parameters listed in `dynamicParameters` and static parameters\n  listed in `staticParameters` will trigger a dynamic reload.\n  The \"all\" option is for certain engines that require static parameters to be set\n  via SQL statements before they can take effect on restart."
                  type: "boolean"
                serviceVersion:
                  description: "ServiceVersion specifies the version of the Service expected to be provisioned by this Component.\nThe version should follow the syntax and semantics of the \"Semantic Versioning\" specification (http://semver.org/).\nIf no version is specified, the latest available version will be used."
                  type: "string"
                staticParameters:
                  description: "List static parameters.\nModifications to any of these parameters require a restart of the process to take effect."
                  items:
                    type: "string"
                  type: "array"
                  x-kubernetes-list-type: "set"
                templateName:
                  description: "Specifies the name of the referenced config template."
                  type: "string"
              type: "object"
            status:
              description: "ParametersDefinitionStatus defines the observed state of ParametersDefinition"
              properties:
                conditions:
                  description: "Represents a list of detailed status of the ParametersDescription object.\n\nThis field is crucial for administrators and developers to monitor and respond to changes within the ParametersDescription.\nIt provides a history of state transitions and a snapshot of the current state that can be used for\nautomated logic or direct inspection."
                  items:
                    description: "Condition contains details for one aspect of the current state of this API Resource."
                    properties:
                      lastTransitionTime:
                        description: "lastTransitionTime is the last time the condition transitioned from one status to another.\nThis should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable."
                        format: "date-time"
                        type: "string"
                      message:
                        description: "message is a human readable message indicating details about the transition.\nThis may be an empty string."
                        maxLength: 32768
                        type: "string"
                      observedGeneration:
                        description: "observedGeneration represents the .metadata.generation that the condition was set based upon.\nFor instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date\nwith respect to the current state of the instance."
                        format: "int64"
                        minimum: 0.0
                        type: "integer"
                      reason:
                        description: "reason contains a programmatic identifier indicating the reason for the condition's last transition.\nProducers of specific condition types may define expected values and meanings for this field,\nand whether the values are considered a guaranteed API.\nThe value should be a CamelCase string.\nThis field may not be empty."
                        maxLength: 1024
                        minLength: 1
                        pattern: "^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$"
                        type: "string"
                      status:
                        description: "status of the condition, one of True, False, Unknown."
                        enum:
                          - "True"
                          - "False"
                          - "Unknown"
                        type: "string"
                      type:
                        description: "type of condition in CamelCase or in foo.example.com/CamelCase."
                        maxLength: 316
                        pattern: "^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$"
                        type: "string"
                    required:
                      - "lastTransitionTime"
                      - "message"
                      - "reason"
                      - "status"
                      - "type"
                    type: "object"
                  type: "array"
                observedGeneration:
                  description: "The most recent generation number of the ParamsDesc object that has been observed by the controller."
                  format: "int64"
                  type: "integer"
                phase:
                  description: "Specifies the status of the configuration template.\nWhen set to PDAvailablePhase, the ParamsDesc can be referenced by ComponentDefinition."
                  enum:
                    - "Available"
                    - "Unavailable"
                    - "Deleting"
                  type: "string"
              type: "object"
          type: "object"
      served: true
      storage: true
      subresources:
        status: {}
