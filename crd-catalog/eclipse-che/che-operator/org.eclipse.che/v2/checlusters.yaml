                          description: "Public URL of the Identity Provider server.\nFor OpenShift with built-in OAuth, this field is not used, as OpenShift provides its own OAuth server."
                          type: "string"
                        identityToken:
                          description: "Identity token type to be passed to upstream services. Defaults to `id_token`.\nFor OpenShift with built-in OAuth, defaults to `access_token`."
                          enum:
                            - "id_token"
                            - "access_token"
                          type: "string"
                        oAuthAccessTokenInactivityTimeoutSeconds:
                          description: "Inactivity timeout for tokens in seconds.\nThis field is specific to OpenShift with built-in OAuth. It is set on the `OAuthClient` resource.\n0 means tokens for this client never time out."
                          format: "int32"
                          type: "integer"
                        oAuthAccessTokenMaxAgeSeconds:
                          description: "Access token max age in seconds.\nThis field is specific to OpenShift with built-in OAuth. It is set on the `OAuthClient` resource.\n0 means no expiration."
                          format: "int32"
                          type: "integer"
                        oAuthClientName:
                          description: "Defined the OIDC client id.\nFor OpenShift with built-in OAuth, this is the name of the `OAuthClient` resource used to set up identity federation."
                          type: "string"
                        oAuthScope:
                          description: "Defines the scope requested from the OIDC provider.\nFor OpenShift with built-in OAuth, the scope `user:full` is used by default."
                          type: "string"
                        oAuthSecret:
                          description: "Defines the OAuth client secret.\nIt can either be a plain text secret value or the name of a Kubernetes secret\ncontaining a key `oAuthSecret` with the secret value. The Kubernetes secret must exist in the same namespace\nas the `CheCluster` resource and have the label `app.kubernetes.io/part-of=che.eclipse.org`.\nFor OpenShift with built-in OAuth, this is the secret set in the `OAuthClient` resource used to set up identity federation."
                          type: "string"
                      type: "object"
                    domain:
                      description: "For an OpenShift cluster, the Operator uses the domain to generate a hostname for the route.\nThe generated hostname follows this pattern: che-<che-namespace>.<domain>. The <che-namespace> is the namespace where the CheCluster CRD is created.\nIn conjunction with labels, it creates a route served by a non-default Ingress controller.\nFor a Kubernetes cluster, it contains a global ingress domain. There are no default values: you must specify them."
                      type: "string"
                    hostname:
                      description: "The public hostname of the installed Che server."
                      type: "string"
                    ingressClassName:
                      description: "IngressClassName is the name of an IngressClass cluster resource.\nIf a class name is defined in both the `IngressClassName` field and the `kubernetes.io/ingress.class` annotation,\n`IngressClassName` field takes precedence."
                      type: "string"
                    labels:
                      additionalProperties:
                        type: "string"
                      description: "Defines labels which will be set for an Ingress (a route for OpenShift platform)."
                      type: "object"
                    tlsSecretName:
                      description: "The name of the secret used to set up Ingress TLS termination.\nIf the field is an empty string, the default cluster certificate is used.\nThe secret must have a `app.kubernetes.io/part-of=che.eclipse.org` label."
                      type: "string"
