                              type: "string"
                            time:
                              description: "Time represents for the running time of the node task."
                              type: "string"
                          type: "object"
                        type: "array"
                      nodeName:
                        description: "NodeName is the name of edge node."
                        type: "string"
                      phase:
                        description: "Phase represents for the phase of the node task."
                        type: "string"
                      reason:
                        description: "Reason represents the reason for the failure of the node task."
                        type: "string"
                    type: "object"
                  type: "array"
                phase:
                  description: "Phase represents for the phase of the ConfigUpdateJob"
                  type: "string"
                reason:
                  description: "Reason represents for the reason of the ConfigUpdateJob."
                  type: "string"
              required:
                - "phase"
              type: "object"
          type: "object"
      served: true
      storage: true
      subresources:
        status: {}
