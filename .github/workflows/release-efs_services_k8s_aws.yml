name: Release efs_services_k8s_aws
on:
  schedule:
    - cron: 0 15 * * THU
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: commits
        name: Count Commits
        run: echo "count=$(git rev-list --count HEAD --since='last Thursday' -- custom-resources/efs_services_k8s_aws)" >> $GITHUB_OUTPUT
      - id: release
        name: Create Release Version
        if: steps.commits.outputs.count > 0
        run: echo "version=3.$(date --utc +'%Y%m%d').$(date --utc +'%-H%M%S')" >> $GITHUB_OUTPUT
      - name: Set up Rust
        if: steps.commits.outputs.count > 0
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-workspaces
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit
      - name: Cargo Version
        if: steps.commits.outputs.count > 0
        run: cargo set-version --package kcr_efs_services_k8s_aws ${{ steps.release.outputs.version }}
      - name: Publish to crates.io
        if: steps.commits.outputs.count > 0
        run: >
          cargo publish
          --allow-dirty
          --token ${{ secrets.CRATES_IO_TOKEN }}
          --package kcr_efs_services_k8s_aws
          --jobs 1
          --no-verify
        env:
          RUSTFLAGS: "-A warnings"
